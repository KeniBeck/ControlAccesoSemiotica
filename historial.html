<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial | Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/variables.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    <link href="css/navbar.css" rel="stylesheet">
    <link href="css/internal.css" rel="stylesheet">
</head>
<body class="app-page">
    <div id="app-layout"></div>

    <main class="app-main">
        <div class="container-fluid">
            <div class="page-header">
                <div class="header-info">
                    <span class="page-icon"><i class="fas fa-history"></i></span>
                    <div>
                        <h1>Historial de accesos</h1>
                        <p class="page-subtitle" id="pageTime"></p>
                    </div>
                </div>
                <a href="ingreso.html" class="btn-primary-custom">
                    <i class="fas fa-plus"></i> Nuevo registro
                </a>
            </div>

            <div class="stats-grid">
                <div class="stat-box stat-blue">
                    <div class="stat-icon"><i class="fas fa-list"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statTotal">0</p>
                        <p class="stat-label">Total registros</p>
                    </div>
                </div>
                <div class="stat-box stat-green">
                    <div class="stat-icon"><i class="fas fa-sign-in-alt"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statEntradas">0</p>
                        <p class="stat-label">Entradas</p>
                    </div>
                </div>
                <div class="stat-box stat-orange">
                    <div class="stat-icon"><i class="fas fa-sign-out-alt"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statSalidas">0</p>
                        <p class="stat-label">Salidas</p>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <h3>Registros guardados</h3>
                <div class="filters-bar">
                    <input type="text" class="form-control search-box" id="searchHistorial" placeholder="Buscar por nombre o documento...">
                    <select class="form-select" id="filterTipo">
                        <option value="todos">Todos</option>
                        <option value="Entrada">Entrada</option>
                        <option value="Salida">Salida</option>
                    </select>
                    <select class="form-select" id="filterArea">
                        <option value="todos">Todas las áreas</option>
                    </select>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Fecha y hora</th>
                            <th>Documento</th>
                            <th>Persona</th>
                            <th>Área</th>
                            <th>Tipo</th>
                            <th>Método</th>
                            <th>Observación</th>
                        </tr>
                    </thead>
                    <tbody id="historialTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/modules/config.js"></script>
    <script src="js/modules/data/appData.js"></script>
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/models/AccesoModel.js"></script>
    <script src="js/modules/data/DataStore.js"></script>
    <script src="js/modules/models/AuthModel.js"></script>
    <script src="js/modules/components/Layout.js"></script>
    <script src="js/modules/components/Footer.js"></script>
    <script src="js/modules/controllers/HistorialController.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
