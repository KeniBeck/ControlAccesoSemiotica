<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/variables.css" rel="stylesheet">
    <link href="css/darkmode.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    <link href="css/navbar.css" rel="stylesheet">
    <link href="css/internal.css" rel="stylesheet">
    <link href="css/forms.css" rel="stylesheet">
</head>

<body class="app-page">
    <div id="app-layout"></div>

    <main class="dashboard-main">
        <div class="container-fluid">
            <div class="page-header dashboard-header">
                <div class="header-info">
                    <span class="page-icon dashboard-icon"><i class="fas fa-user-circle"></i></span>
                    <div>
                        <h1>Mi Perfil</h1>
                        <p class="page-subtitle">Actualiza tu información personal</p>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- Avatar -->
                <div class="col-lg-3">
                    <div class="content-card text-center">
                        <div class="mb-3">
                            <div id="perfil-avatar-icon"
                                style="width:100px;height:100px;border-radius:50%;background:var(--primary-blue);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:2.5rem;color:#fff;">
                                <i class="fas fa-user"></i>
                            </div>
                            <img id="perfil-preview" src="#" alt="Foto de perfil"
                                style="display:none;width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--primary-blue);">
                        </div>
                        <label class="btn btn-outline-primary btn-sm mt-2">
                            <i class="fas fa-camera me-1"></i> Cambiar foto
                            <input type="file" id="perfil-foto" accept="image/*" class="d-none">
                        </label>
                        <p class="text-muted mt-3" style="font-size:0.8rem;">JPG, PNG o GIF — máx. 2 MB</p>
                    </div>
                </div>

                <!-- Formulario -->
                <div class="col-lg-9">
                    <div class="content-card">
                        <h3 class="mb-4"><i class="fas fa-edit me-2"></i>Editar datos</h3>
                        <form id="formPerfil" novalidate>
                            <input type="hidden" id="ratingValue" value="0">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre completo *</label>
                                    <input type="text" class="form-control" id="perfil-nombre" placeholder="Tu nombre">
                                    <div class="invalid-feedback">El nombre es requerido</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo electrónico *</label>
                                    <input type="email" class="form-control" id="perfil-email"
                                        placeholder="correo@ejemplo.com">
                                    <div class="invalid-feedback">Ingresa un correo válido</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" id="perfil-telefono"
                                        placeholder="300 000 0000">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Cargo / Rol</label>
                                    <input type="text" class="form-control" id="perfil-cargo"
                                        placeholder="Ej: Docente de Matemáticas">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Biografía breve</label>
                                    <textarea class="form-control" id="perfil-bio" rows="3"
                                        placeholder="Cuéntanos algo sobre ti..."></textarea>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="fas fa-save me-2"></i>Guardar cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/modules/config.js"></script>
    <script src="js/modules/data/appData.js"></script>
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/models/AccesoModel.js"></script>
    <script src="js/modules/data/DataStore.js"></script>
    <script src="js/modules/models/AuthModel.js"></script>
    <script src="js/modules/components/Layout.js"></script>
    <script src="js/modules/components/Footer.js"></script>
    <script src="js/modules/controllers/ConfigController.js"></script>
    <script src="js/modules/controllers/PerfilController.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
