<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Control de Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/variables.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    <link href="css/navbar.css" rel="stylesheet">
    <link href="css/internal.css" rel="stylesheet">
</head>
<body class="app-page">
    <div id="app-layout"></div>

    <main class="app-main">
        <div class="container-fluid">
            <div class="page-header">
                <div class="header-info">
                    <span class="page-icon"><i class="fas fa-chart-bar"></i></span>
                    <div>
                        <h1>Reportes</h1>
                        <p class="page-subtitle" id="pageTime"></p>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box stat-blue">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statTotal">0</p>
                        <p class="stat-label">Reportes generados</p>
                    </div>
                </div>
                <div class="stat-box stat-green">
                    <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statMes">0</p>
                        <p class="stat-label">Este mes</p>
                    </div>
                </div>
                <div class="stat-box stat-orange">
                    <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statPendientes">0</p>
                        <p class="stat-label">Pendientes</p>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <h3>Listado de reportes</h3>
                <div class="filters-bar">
                    <select class="form-select" id="filterMes">
                        <option value="todos">Todos los meses</option>
                        <option value="06">Junio 2026</option>
                        <option value="05">Mayo 2026</option>
                    </select>
                    <select class="form-select" id="filterTipo">
                        <option value="todos">Todos</option>
                        <option value="Entrada">Entrada</option>
                        <option value="Salida">Salida</option>
                    </select>
                    <button type="button" class="btn-primary-custom" id="btnFiltrar">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Área</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="reportesTableBody"></tbody>
                </table>
            </div>

            <div class="row">
                <div class="col-lg-6">
                    <div class="content-card">
                        <h3>Reportes por tipo</h3>
                        <canvas id="reportesTipoChart"></canvas>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="content-card">
                        <h3>Accesos por bloque</h3>
                        <canvas id="reportesBloqueChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/modules/config.js"></script>
    <script src="js/modules/data/appData.js"></script>
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/models/AccesoModel.js"></script>
    <script src="js/modules/data/DataStore.js"></script>
    <script src="js/modules/models/AuthModel.js"></script>
    <script src="js/modules/components/Layout.js"></script>
    <script src="js/modules/components/Footer.js"></script>
    <script src="js/modules/controllers/ReportesController.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
