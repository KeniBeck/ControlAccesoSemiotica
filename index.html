<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcesoSeguro Educativo - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/variables.css" rel="stylesheet">
    <link href="css/forms.css" rel="stylesheet">
    <link href="css/buttons.css" rel="stylesheet">
    <link href="css/toast.css" rel="stylesheet">
    <link href="css/login.css" rel="stylesheet">
</head>

<body class="login-page">
    <div class="login-wrapper">
        <div class="login-form-container">
            <div class="logo-header">
                <img src="images/AccesoSeguroEducativo_logo.svg" alt="AcesoSeguro Logo">
            </div>

            <h1>Bienvenido</h1>
            <p class="subtitle">Inicia sesión en tu cuenta</p>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Correo Electrónico
                    </label>
                    <input type="email" class="form-control" id="email" name="email"
                        placeholder="ejemplo@elpoli.edu.co" required autocomplete="email">
                    <div class="invalid-feedback" id="emailError">
                        Por favor ingresa un correo válido
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <div class="password-group">
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="btn-toggle-pwd" id="togglePassword" title="Mostrar/Ocultar contraseña">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" id="passwordError">
                        La contraseña es requerida
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Recuérdame en este dispositivo
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <span id="btnText">Iniciar Sesión</span>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
                </button>
            </form>

            <div class="login-footer">
                <a href="#" class="link-forgot">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="loginToast" class="toast" role="alert">
            <div class="toast-header bg-success text-white">
                <i class="fas fa-check-circle me-2"></i>
                <strong class="me-auto">Éxito</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Sesión iniciada correctamente
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script src="js/modules/config.js"></script>
    <script src="js/modules/data/appData.js"></script>
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/models/AccesoModel.js"></script>
    <script src="js/modules/data/DataStore.js"></script>
    <script src="js/modules/models/AuthModel.js"></script>
    <script src="js/modules/views/LoginView.js"></script>
    <script src="js/modules/controllers/LoginController.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
