<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Control de Acceso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <link href="css/variables.css" rel="stylesheet">
    <link href="css/sidebar.css" rel="stylesheet">
    <link href="css/navbar.css" rel="stylesheet">
    <link href="css/internal.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
</head>

<body class="app-page">
    <div id="app-layout"></div>

    <main class="dashboard-main">
        <div class="container-fluid">
            <!-- Dashboard Header -->
            <div class="page-header dashboard-header">
                <div class="header-info">
                    <span class="page-icon dashboard-icon"><i class="fas fa-tachometer-alt"></i></span>
                    <div>
                        <h1>Dashboard</h1>
                        <p class="page-subtitle timestamp" id="dashboardTime"></p>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box stat-blue">
                    <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statTotal">0</p>
                        <p class="stat-label">Total accesos</p>
                    </div>
                </div>
                <div class="stat-box stat-green">
                    <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statDocentes">0</p>
                        <p class="stat-label">Docentes activos</p>
                    </div>
                </div>
                <div class="stat-box stat-purple">
                    <div class="stat-icon"><i class="fas fa-sign-in-alt"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statEntradas">0</p>
                        <p class="stat-label">Entradas</p>
                    </div>
                </div>
                <div class="stat-box stat-orange">
                    <div class="stat-icon"><i class="fas fa-qrcode"></i></div>
                    <div class="stat-info">
                        <p class="stat-number" id="statQr">0</p>
                        <p class="stat-label">Registros por QR</p>
                    </div>
                </div>
            </div>

            <div class="charts-section">
                <div class="row">
                    <div class="col-lg-6">
                        <div class="chart-card content-card">
                            <h3>Accesos por área</h3>
                            <canvas id="recurrenceChart"></canvas>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="chart-card content-card">
                            <h3>Top docentes</h3>
                            <div class="teachers-table">
                                <div class="teachers-header">
                                    <span class="col-num">#</span>
                                    <span class="col-name">Nombre</span>
                                    <span class="col-popularity">Actividad</span>
                                    <span class="col-percent">Total</span>
                                </div>
                                <div id="topDocentesBody"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="line-chart-section">
                <div class="chart-card content-card">
                    <h3>Entradas y salidas</h3>
                    <canvas id="patternsChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="js/modules/config.js"></script>
    <script src="js/modules/data/appData.js"></script>
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/models/AccesoModel.js"></script>
    <script src="js/modules/data/DataStore.js"></script>
    <script src="js/modules/models/AuthModel.js"></script>
    <script src="js/modules/components/Layout.js"></script>
    <script src="js/modules/components/Footer.js"></script>
    <script src="js/modules/controllers/DashboardController.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
